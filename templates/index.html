<!DOCTYPE html>
<html>
<head>

<title>Number To Words</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body id="body">

<div class="container mt-5">

<div class="card shadow p-4 text-center">

<h2>Number To Words Converter</h2>

<form method="post">

{% csrf_token %}

<input type="number" name="number" class="form-control mt-3" placeholder="Enter Number">

<button class="btn btn-primary mt-3">Convert</button>

</form>

<h4 class="mt-4" id="result">{{result}}</h4>

<button class="btn btn-success mt-2" onclick="copyText()">Copy</button>

<button class="btn btn-warning mt-2" onclick="speak()">🔊 Speak</button>

<button class="btn btn-dark mt-2" onclick="toggleMode()">🌙 Dark Mode</button>

</div>

</div>
<script>

function copyText(){

let text = document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Copied!")

}

</script>
<script>

function toggleMode(){

let body = document.getElementById("body")

body.classList.toggle("bg-dark")
body.classList.toggle("text-white")

}

</script>
<h4 class="mt-4">Recent History</h4>

<ul>

{% for h in history %}

<li>{{h.number}} → {{h.words}}</li>

{% endfor %}

</ul>
</body>
</html>
